# Slack Notify
#
# SECURITY — fields like commit messages, PR titles, branch names, and actor
# login are user-controlled. They are NOT interpolated via ${{ }} into shell
# scripts (that pattern is vulnerable to shell injection). Instead, they are
# bound to env vars and referenced via standard $VAR expansion, which the
# shell quotes safely.
name: Slack Notify
on:
  push:
    branches: ['track-*']
  pull_request:
    types: [opened, closed, ready_for_review]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check for webhook
        id: check
        run: |
          if [ -z "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SLACK_WEBHOOK_URL missing — skipping Slack ping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build message
        if: steps.check.outputs.skip == 'false'
        id: msg
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          PR_ACTION: ${{ github.event.action }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          case "$EVENT_NAME" in
            push)
              TEXT="[${REF_NAME}] @${ACTOR} pushed: ${COMMIT_MSG}"
              ;;
            pull_request)
              case "$PR_ACTION" in
                opened)            TEXT="PR opened: <${PR_URL}|${PR_TITLE}>" ;;
                closed)            TEXT="PR closed: <${PR_URL}|${PR_TITLE}>" ;;
                ready_for_review)  TEXT="PR ready for review: <${PR_URL}|${PR_TITLE}>" ;;
                *)                 TEXT="PR event: ${PR_ACTION} — <${PR_URL}|${PR_TITLE}>" ;;
              esac
              ;;
            *) TEXT="Event: ${EVENT_NAME}" ;;
          esac
          # Use jq for safe JSON encoding (handles quotes, newlines, unicode)
          echo "payload=$(jq -cn --arg t "$TEXT" '{text:$t}')" >> "$GITHUB_OUTPUT"
      - name: Post to Slack
        if: steps.check.outputs.skip == 'false'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          PAYLOAD: ${{ steps.msg.outputs.payload }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK" || true
