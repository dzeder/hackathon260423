name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for ANTHROPIC_API_KEY
        id: check
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY secret missing — skipping Claude PR review (not a CI failure)."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: '3.11'

      - name: Install anthropic SDK
        if: steps.check.outputs.skip == 'false'
        run: pip install anthropic

      - name: Compute diff
        if: steps.check.outputs.skip == 'false'
        id: diff
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)references' ':(exclude)*.lock' ':(exclude).context')
          # truncate extra-long diffs to keep API call cheap
          echo "$DIFF" | head -c 60000 > /tmp/pr.diff
          echo "path=/tmp/pr.diff" >> "$GITHUB_OUTPUT"

      - name: Call Claude
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 .github/scripts/claude_pr_review.py \
            --diff-file "${{ steps.diff.outputs.path }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --track "${{ github.head_ref }}" \
            > review.md

      - name: Post comment
        if: steps.check.outputs.skip == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('review.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
