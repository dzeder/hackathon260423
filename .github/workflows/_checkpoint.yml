name: _checkpoint
on:
  workflow_call:
    inputs:
      time:
        required: true
        type: string

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for ANTHROPIC_API_KEY
        id: check
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY missing — skipping checkpoint generation."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip == 'false'
        with:
          python-version: '3.11'
      - name: Install anthropic SDK
        if: steps.check.outputs.skip == 'false'
        run: pip install anthropic
      - name: Run checkpoint
        if: steps.check.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHECKPOINT_TIME: ${{ inputs.time }}
        run: |
          python3 .github/scripts/checkpoint.py --time="$CHECKPOINT_TIME" > "checkpoint-${CHECKPOINT_TIME}.md"
      - name: Post to Slack
        if: steps.check.outputs.skip == 'false'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          CHECKPOINT_TIME: ${{ inputs.time }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "SLACK_WEBHOOK_URL missing — skipping post."
            exit 0
          fi
          MSG=$(head -c 1500 "checkpoint-${CHECKPOINT_TIME}.md")
          HEADER="@captain ${CHECKPOINT_TIME} CHECKPOINT:"
          PAYLOAD=$(jq -cn --arg header "$HEADER" --arg msg "$MSG" '{text: ($header + "\n" + $msg)}')
          curl -s -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK" || true
      - name: Gate merges until ack
        if: steps.check.outputs.skip == 'false'
        env:
          CHECKPOINT_TIME: ${{ inputs.time }}
        run: |
          git config user.name "checkpoint-bot"
          git config user.email "checkpoint@ohanafy.local"
          touch ".checkpoint-${CHECKPOINT_TIME}-pending"
          git add ".checkpoint-${CHECKPOINT_TIME}-pending"
          git diff --staged --quiet || git commit -m "gate: ${CHECKPOINT_TIME} checkpoint pending"
          git push || true
