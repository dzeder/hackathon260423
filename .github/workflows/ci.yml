name: CI
on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck --if-present

  unit-tests-webapp:
    name: Unit tests — web-app
    runs-on: ubuntu-latest
    needs: lint-and-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm -w packages/web-app run test --if-present

  unit-tests-mcp:
    name: Unit tests — ${{ matrix.server }}
    runs-on: ubuntu-latest
    needs: lint-and-types
    strategy:
      fail-fast: false
      matrix:
        server: [ohanafy-forecast, ohanafy-events, ohanafy-memory, ohanafy-network]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm -w packages/mcp-servers/${{ matrix.server }} run test --if-present

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests-webapp, unit-tests-mcp]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Resolve preview URL (if any)
        id: vercel
        run: |
          # Vercel preview URL pattern is repo-specific; this is a placeholder
          # that Track A will replace with a real resolver once Vercel is wired.
          echo "url=${VERCEL_PREVIEW_URL:-http://localhost:3000}" >> "$GITHUB_OUTPUT"
      - name: Run E2E (skip if no preview URL)
        if: steps.vercel.outputs.url != 'http://localhost:3000'
        env:
          DEMO_URL: ${{ steps.vercel.outputs.url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx playwright test --config=packages/web-app/playwright.config.ts
      - name: Skip note
        if: steps.vercel.outputs.url == 'http://localhost:3000'
        run: echo "No Vercel preview URL yet — E2E skipped. This is expected until Track A deploys."
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  apex-tests:
    name: Apex tests
    runs-on: ubuntu-latest
    # SECURITY — SF_AUTH_URL grants deploy access to the sandbox org.
    # The `hackathon-deploy` GitHub Environment gates this job with
    # branch protection + (optionally) required reviewer. See README §Secrets.
    environment: hackathon-deploy
    needs: lint-and-types
    # Run on any PR or push; the job self-skips when (a) the SF_AUTH_URL
    # secret is missing or (b) no Apex / metadata files changed. We avoid a
    # label-based gate because labels are easy to forget and the bind-test
    # work in OhfyPlanMemoryStore must not regress silently.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so the origin/master diff below works.
          fetch-depth: 0
      - name: Check if Apex tests should run
        id: should_run
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ -z "${{ secrets.SF_AUTH_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SF_AUTH_URL secret missing — skipping Apex tests (not a CI failure)."
            exit 0
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # PR: diff the branch against the merge base on the target.
            REF="${BASE_REF:-master}"
            git fetch --no-tags --depth=1 origin "$REF" 2>/dev/null || true
            DIFF_RANGE="origin/${REF}...HEAD"
          else
            # Push: diff the new tip against the SHA before the push. If
            # `before` is the zero SHA (first push to a new branch / force
            # push) fall back to running (better than missing real changes).
            if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Push without a 'before' SHA — running Apex tests defensively."
              exit 0
            fi
            DIFF_RANGE="${BEFORE_SHA}..HEAD"
          fi
          CHANGED=$(git diff --name-only "$DIFF_RANGE" -- \
            force-app/ packages/sfdx-package/ 2>/dev/null | head -n1 || echo "")
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Apex / SFDX files changed in $DIFF_RANGE — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Apex / SFDX changes detected — will run RunLocalTests."
          fi
      - name: Install Salesforce CLI
        if: steps.should_run.outputs.skip == 'false'
        run: npm install -g @salesforce/cli
      - name: Auth to sandbox
        if: steps.should_run.outputs.skip == 'false'
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          printf '%s' "$SF_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt \
            --alias ohanafy-hack-sandbox --set-default
          rm -f sfdx_auth.txt
      - name: Deploy + run Apex tests (RunLocalTests, 75% coverage bar)
        if: steps.should_run.outputs.skip == 'false'
        run: |
          # --ignore-conflicts: source tracking against this scratch / sandbox
          # routinely shows divergence (admin tweaks in Setup, prior CI runs)
          # that source-only tracking can't reconcile. The branch's force-app/
          # is the source of truth for what should be in the org; if a human
          # made an out-of-band change they wanted to keep, they should have
          # retrieved + committed it before opening the PR.
          # The deploy regularly fails fast with 0/78 components and a generic
          # "Status: Failed" — the platform's UNKNOWN_EXCEPTION path. The
          # actionable detail (ErrorId, errorMessage, per-component problem)
          # only surfaces via `deploy report --json`, so on failure we re-run
          # the report and dump errorMessage + componentFailures.
          set +e
          sf project deploy start \
            --source-dir force-app \
            --target-org ohanafy-hack-sandbox \
            --test-level RunLocalTests \
            --ignore-conflicts
          DEPLOY_EXIT=$?
          if [ "$DEPLOY_EXIT" -ne 0 ]; then
            echo "::group::Deploy failed — JSON report"
            REPORT="$(sf project deploy report \
              --target-org ohanafy-hack-sandbox \
              --use-most-recent --json 2>/dev/null || true)"
            # Top-level error message (the UNKNOWN_EXCEPTION ErrorId lives here)
            echo "--- result.response.errorMessage ---"
            echo "$REPORT" | jq -r '.result.response.errorMessage // .result.errorMessage // "(none)"'
            echo "--- result.response.errorStatusCode ---"
            echo "$REPORT" | jq -r '.result.response.errorStatusCode // "(none)"'
            # Per-component failures (rare on UNKNOWN_EXCEPTION, common on real bugs)
            echo "--- result.details.componentFailures (first 20) ---"
            echo "$REPORT" | jq -r '.result.details.componentFailures[0:20] // .result.response.details.componentFailures[0:20] // [] | .[] | "\(.componentType) \(.fullName): \(.problem) (\(.lineNumber // "?"):\(.columnNumber // "?"))"'
            echo "::endgroup::"
            exit "$DEPLOY_EXIT"
          fi
      - name: Apex tests skipped — note for log
        if: steps.should_run.outputs.skip == 'true'
        run: echo "::notice::Apex tests skipped — see step log for reason."

  dd-ci-event:
    name: Datadog CI event
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-tests-webapp, unit-tests-mcp]
    if: always()
    steps:
      - name: Post CI outcome to Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$DD_API_KEY" ]; then
            echo "DD_API_KEY missing — skipping Datadog event (not a CI failure)."
            exit 0
          fi
          TITLE="CI ${JOB_STATUS} — PR #${PR_NUMBER:-push}"
          PAYLOAD=$(jq -cn \
            --arg title "$TITLE" \
            --arg text "Branch: ${BRANCH}" \
            --arg status "$JOB_STATUS" \
            '{title:$title, text:$text, tags:["service:ohanafy-plan-ci","env:hackathon",("status:"+$status)]}')
          curl -s -X POST "https://api.datadoghq.com/api/v1/events" \
            -H "DD-API-KEY: $DD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
