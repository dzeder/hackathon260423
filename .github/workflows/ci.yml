name: CI
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-types:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck --if-present

  unit-tests-webapp:
    name: Unit tests — web-app
    runs-on: ubuntu-latest
    needs: lint-and-types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm -w packages/web-app run test --if-present

  unit-tests-mcp:
    name: Unit tests — ${{ matrix.server }}
    runs-on: ubuntu-latest
    needs: lint-and-types
    strategy:
      fail-fast: false
      matrix:
        server: [ohanafy-forecast, ohanafy-events, ohanafy-memory, ohanafy-network]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm -w packages/mcp-servers/${{ matrix.server }} run test --if-present

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    needs: [unit-tests-webapp, unit-tests-mcp]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Resolve preview URL (if any)
        id: vercel
        run: |
          # Vercel preview URL pattern is repo-specific; this is a placeholder
          # that Track A will replace with a real resolver once Vercel is wired.
          echo "url=${VERCEL_PREVIEW_URL:-http://localhost:3000}" >> "$GITHUB_OUTPUT"
      - name: Run E2E (skip if no preview URL)
        if: steps.vercel.outputs.url != 'http://localhost:3000'
        env:
          DEMO_URL: ${{ steps.vercel.outputs.url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx playwright test --config=packages/web-app/playwright.config.ts
      - name: Skip note
        if: steps.vercel.outputs.url == 'http://localhost:3000'
        run: echo "No Vercel preview URL yet — E2E skipped. This is expected until Track A deploys."
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  apex-tests:
    name: Apex tests
    runs-on: ubuntu-latest
    # SECURITY — SF_AUTH_URL grants deploy access to the sandbox org.
    # The `hackathon-deploy` GitHub Environment gates this job with
    # branch protection + (optionally) required reviewer. See README §Secrets.
    environment: hackathon-deploy
    needs: lint-and-types
    if: |
      github.event_name == 'pull_request' &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'track-c') ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Check if Apex tests should run
        id: should_run
        run: |
          if [ -z "${{ secrets.SF_AUTH_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SF_AUTH_URL secret missing — skipping Apex tests (not a CI failure)."
            exit 0
          fi
          CHANGED=$(git diff --name-only origin/main...HEAD -- force-app/ packages/sfdx-package/ 2>/dev/null | head -n1 || echo "")
          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No Track C files changed — skipping Apex tests."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install Salesforce CLI
        if: steps.should_run.outputs.skip == 'false'
        run: npm install -g @salesforce/cli
      - name: Auth to sandbox
        if: steps.should_run.outputs.skip == 'false'
        env:
          SF_AUTH_URL: ${{ secrets.SF_AUTH_URL }}
        run: |
          printf '%s' "$SF_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt \
            --alias ohanafy-hack-sandbox --set-default
          rm -f sfdx_auth.txt
      - name: Run Apex tests
        if: steps.should_run.outputs.skip == 'false'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ohanafy-hack-sandbox \
            --test-level RunLocalTests

  dd-ci-event:
    name: Datadog CI event
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-tests-webapp, unit-tests-mcp]
    if: always()
    steps:
      - name: Post CI outcome to Datadog
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          JOB_STATUS: ${{ job.status }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -z "$DD_API_KEY" ]; then
            echo "DD_API_KEY missing — skipping Datadog event (not a CI failure)."
            exit 0
          fi
          TITLE="CI ${JOB_STATUS} — PR #${PR_NUMBER:-push}"
          PAYLOAD=$(jq -cn \
            --arg title "$TITLE" \
            --arg text "Branch: ${BRANCH}" \
            --arg status "$JOB_STATUS" \
            '{title:$title, text:$text, tags:["service:ohanafy-plan-ci","env:hackathon",("status:"+$status)]}')
          curl -s -X POST "https://api.datadoghq.com/api/v1/events" \
            -H "DD-API-KEY: $DD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true
