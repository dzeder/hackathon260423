<template>
    <lightning-card title="Ohanafy Plan — Copilot" icon-name="standard:einstein">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <lightning-combobox
                name="scenario"
                label="Scenario"
                value={scenarioId}
                options={scenarioOptions}
                onchange={handleScenarioChange}
                class="slds-m-bottom_small"
            ></lightning-combobox>

            <p class="slds-text-heading_small slds-m-top_small">Applied events</p>
            <ul class="slds-has-dividers_bottom-space slds-m-top_x-small">
                <template for:each={eventOptions} for:item="event">
                    <li key={event.id} class="slds-item slds-grid slds-grid_align-spread slds-p-vertical_xx-small">
                        <span class="slds-text-body_regular">{event.label}</span>
                        <lightning-button
                            data-id={event.id}
                            label={event.buttonLabel}
                            variant={event.variant}
                            onclick={handleEventToggle}
                        ></lightning-button>
                    </li>
                </template>
            </ul>

            <lightning-textarea
                name="prompt"
                label="Ask the copilot"
                placeholder="Ask about EBITDA, revenue, or specific events…"
                value={prompt}
                onchange={handlePromptChange}
                class="slds-m-top_small"
                data-testid="copilot-prompt"
            ></lightning-textarea>

            <div class="slds-m-top_x-small" data-testid="copilot-suggestions">
                <template for:each={suggestions} for:item="suggestion">
                    <lightning-button
                        key={suggestion}
                        label={suggestion}
                        data-value={suggestion}
                        variant="neutral"
                        onclick={handleSuggestion}
                        class="slds-m-right_x-small slds-m-bottom_x-small"
                    ></lightning-button>
                </template>
            </div>

            <div class="slds-m-top_small">
                <lightning-button
                    label="Ask copilot"
                    variant="brand"
                    onclick={handleSubmit}
                    disabled={submitDisabled}
                    data-testid="copilot-submit"
                ></lightning-button>
            </div>

            <template lwc:if={hasError}>
                <div
                    class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-m-top_small"
                    role="alert"
                    data-testid="copilot-error"
                >
                    <span class="slds-assistive-text">error</span>
                    {errorMessage}
                </div>
            </template>

            <template lwc:if={hasResponse}>
                <div class="slds-box slds-theme_shade slds-m-top_small" data-testid="copilot-response">
                    <p class="slds-text-heading_small">
                        Response
                        <span class={sourceBadgeClass}>{sourceLabel}</span>
                    </p>
                    <p class="slds-text-body_regular slds-m-top_x-small">{response.text}</p>

                    <template lwc:if={response.bullets.length}>
                        <ul class="slds-list_dotted slds-m-top_x-small">
                            <template for:each={response.bullets} for:item="bullet">
                                <li key={bullet}>{bullet}</li>
                            </template>
                        </ul>
                    </template>

                    <template lwc:if={response.citations.length}>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                            Sources:
                            <template for:each={response.citations} for:item="cite">
                                <span key={cite} class="slds-m-right_x-small">· {cite}</span>
                            </template>
                        </p>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
