<template>
    <div class="ohfy-copilot-host">
        <button
            type="button"
            class="ohfy-copilot__fab"
            onclick={handleOpen}
            lwc:if={fabVisible}
            data-testid="copilot-open"
        >
            <span class="ohfy-copilot__fab-icon">
                <lightning-icon icon-name="utility:einstein" size="xx-small" alternative-text="Ask copilot"></lightning-icon>
            </span>
            Ask copilot
        </button>

        <template lwc:if={isOpen}>
            <div class="ohfy-copilot__backdrop" onclick={handleClose}></div>
            <section class="ohfy-copilot__drawer" role="dialog" aria-label="Copilot chat">
                <header class="ohfy-copilot__header">
                    <div>
                        <p class="ohfy-copilot__eyebrow">Copilot</p>
                        <p class="ohfy-copilot__title">Ask about this scenario</p>
                        <p class="ohfy-copilot__sub">Grounded in baseline + {eventCountLabel}{threadCountLabel}.</p>
                    </div>
                    <div class="ohfy-copilot__header-actions">
                        <button
                            type="button"
                            class="ohfy-copilot__new-chat"
                            onclick={handleNewChat}
                            data-testid="copilot-new-chat"
                        >New chat</button>
                        <button
                            type="button"
                            class="ohfy-copilot__close"
                            onclick={handleClose}
                            aria-label="Close copilot"
                            data-testid="copilot-close"
                        >×</button>
                    </div>
                </header>

                <div class="ohfy-copilot__scenario">
                    <lightning-combobox
                        name="scenario"
                        label="Scenario"
                        variant="label-hidden"
                        value={scenarioId}
                        options={scenarioOptions}
                        onchange={handleScenarioChange}
                    ></lightning-combobox>
                </div>

                <div class="ohfy-copilot__chips" data-testid="copilot-events">
                    <template for:each={eventOptions} for:item="event">
                        <button
                            key={event.id}
                            type="button"
                            data-id={event.id}
                            class={event.chipClass}
                            onclick={handleEventToggle}
                        >{event.label}</button>
                    </template>
                </div>

                <template lwc:if={showEmpty}>
                    <div class="ohfy-copilot__suggestions" data-testid="copilot-suggestions">
                        <template for:each={suggestions} for:item="suggestion">
                            <button
                                key={suggestion}
                                type="button"
                                class="ohfy-copilot__suggestion"
                                data-value={suggestion}
                                onclick={handleSuggestion}
                                disabled={isLoading}
                            >{suggestion}</button>
                        </template>
                    </div>
                </template>

                <div class="ohfy-copilot__stream">
                    <template lwc:if={hasGroundingArticles}>
                        <section class="ohfy-copilot__grounding" data-testid="copilot-grounding">
                            <p class="ohfy-copilot__grounding-title">Sources from in-org knowledge</p>
                            <ul class="ohfy-copilot__grounding-list">
                                <template for:each={groundingArticles} for:item="article">
                                    <li key={article.id} class="ohfy-copilot__grounding-item">
                                        <p class="ohfy-copilot__grounding-heading">{article.title}</p>
                                        <p class="ohfy-copilot__grounding-preview">{article.preview}</p>
                                        <p class="ohfy-copilot__grounding-source">{article.source}</p>
                                    </li>
                                </template>
                            </ul>
                        </section>
                    </template>

                    <template lwc:if={hasError}>
                        <div class="ohfy-copilot__error" role="alert" data-testid="copilot-error">{errorMessage}</div>
                    </template>

                    <template for:each={enrichedMessages} for:item="msg">
                        <article
                            key={msg.id}
                            class={msg.bubbleClass}
                            data-role={msg.role}
                            data-testid="copilot-message"
                        >
                            <template lwc:if={msg.isUser}>
                                <p class="ohfy-copilot__user-text">{msg.text}</p>
                            </template>
                            <template lwc:else>
                                <template lwc:if={msg.source}>
                                    <span class={msg.sourceBadgeClass}>{msg.sourceLabel}</span>
                                </template>
                                <p class="ohfy-copilot__response-text">{msg.text}</p>
                                <template lwc:if={msg.hasBullets}>
                                    <ul class="ohfy-copilot__bullets">
                                        <template for:each={msg.bullets} for:item="bullet">
                                            <li key={bullet}>{bullet}</li>
                                        </template>
                                    </ul>
                                </template>
                                <template lwc:if={msg.hasCitations}>
                                    <p class="ohfy-copilot__sources">
                                        Sources:
                                        <template for:each={msg.citations} for:item="cite">
                                            <span key={cite} class="ohfy-copilot__source"> · {cite}</span>
                                        </template>
                                    </p>
                                </template>
                            </template>
                        </article>
                    </template>

                    <template lwc:if={showEmpty}>
                        <p class="ohfy-copilot__empty">Ask a question or pick a suggestion to get started.</p>
                    </template>
                </div>

                <form class="ohfy-copilot__form" onsubmit={handleSubmit}>
                    <lightning-textarea
                        name="prompt"
                        label="Ask the copilot"
                        variant="label-hidden"
                        placeholder={promptPlaceholder}
                        value={prompt}
                        onchange={handlePromptChange}
                        disabled={isLoading}
                        class="ohfy-copilot__textarea"
                        data-testid="copilot-prompt"
                    ></lightning-textarea>
                    <lightning-button
                        label={submitLabel}
                        variant="brand"
                        onclick={handleSubmit}
                        disabled={submitDisabled}
                        data-testid="copilot-submit"
                    ></lightning-button>
                </form>
            </section>
        </template>
    </div>
</template>
